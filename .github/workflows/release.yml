name: Release

on:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: turbo-png

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: linux-aarch64
            needs-cross-toolchain: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: windows-x86_64
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact: windows-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: macos-aarch64
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Extract version from changelog
        id: version
        run: |
          VERSION=$(sed -n 's/^## \[\([^]]*\)\].*/\1/p' CHANGELOG.md | head -1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "release_version=v$VERSION" >> $GITHUB_OUTPUT

      - name: Install toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
          cache: true
          override: true

      - name: Install Linux aarch64 linker
        if: matrix.needs-cross-toolchain == true
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: cargo build --release (target ${{ matrix.target }})
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package artifact
        run: |
          mkdir -p dist
          binary_dir="target/${{ matrix.target }}/release"
          binary_name="${BIN_NAME}"
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            binary_name="${binary_name}.exe"
          fi

          if [[ ! -f "${binary_dir}/${binary_name}" ]]; then
            echo "Expected binary ${binary_dir}/${binary_name} not found" >&2
            ls -R "${binary_dir}"
            exit 1
          fi

          RELEASE_VERSION="${{ steps.version.outputs.release_version }}"
          archive="dist/${BIN_NAME}-${RELEASE_VERSION}-${{ matrix.artifact }}.tar.gz"
          tar -C "${binary_dir}" -czf "${archive}" "${binary_name}"
          echo "ARCHIVE_PATH=${archive}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-${{ steps.version.outputs.release_version }}
          path: ${{ env.ARCHIVE_PATH }}
          if-no-files-found: error

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Extract changelog
        id: changelog
        run: |
          VERSION=$(sed -n 's/^## \[\([^]]*\)\].*/\1/p' CHANGELOG.md | head -1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "release_version=v$VERSION" >> $GITHUB_OUTPUT

          CONTENT=$(awk '
            /^## \[/ {
              if (found) exit
              found=1
              next
            }
            found { print }
          ' CHANGELOG.md)

          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$CONTENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Ensure release tag does not exist
        run: |
          RELEASE_VERSION="${{ steps.changelog.outputs.release_version }}"
          if git ls-remote --exit-code "https://github.com/${{ github.repository }}" "refs/tags/${RELEASE_VERSION}" > /dev/null; then
            echo "Tag ${RELEASE_VERSION} already exists. Choose a new version or delete the existing tag." >&2
            exit 1
          fi

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.changelog.outputs.release_version }}
          name: ${{ steps.changelog.outputs.release_version }}
          body: ${{ steps.changelog.outputs.content }}
          fail_on_unmatched_files: true
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          RELEASE_VERSION="${{ steps.changelog.outputs.release_version }}"
          VERSION_NUM="${RELEASE_VERSION#v}"
          SHA_ARM=$(shasum -a 256 artifacts/macos-aarch64-${RELEASE_VERSION}/${BIN_NAME}-${RELEASE_VERSION}-macos-aarch64.tar.gz | cut -d' ' -f1)
          SHA_X64=$(shasum -a 256 artifacts/macos-x86_64-${RELEASE_VERSION}/${BIN_NAME}-${RELEASE_VERSION}-macos-x86_64.tar.gz | cut -d' ' -f1)

          git clone https://x-access-token:${TAP_TOKEN}@github.com/eddmann/homebrew-tap.git
          cd homebrew-tap

          # Update version
          sed -i "s/version \".*\"/version \"${VERSION_NUM}\"/" Formula/turbo-png.rb

          # Update ARM SHA256 (within on_arm block)
          sed -i "/on_arm/,/end/{s/sha256 \"[a-f0-9]*\"/sha256 \"${SHA_ARM}\"/;}" Formula/turbo-png.rb

          # Update Intel SHA256 (within on_intel block)
          sed -i "/on_intel/,/end/{s/sha256 \"[a-f0-9]*\"/sha256 \"${SHA_X64}\"/;}" Formula/turbo-png.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/turbo-png.rb
          git commit -m "chore(turbo-png): update to ${VERSION_NUM}"
          git push
